name: Build Kernel Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential flex git make libssl-dev libelf-dev lz4 zip wget clang lld llvm

      - name: Build Image
        run: |
          cd kernel_source
          make -j$(($(nproc)*30)) Image

      - name: Package Magisk zip
        run: |
          mkdir -p zip/META-INF/com/google/android
          cp kernel_source/arch/arm64/boot/Image zip/

          cat > zip/META-INF/com/google/android/update-binary << 'EOF'
          #!/sbin/sh
          SKIPUNZIP=1
          unzip -o "$ZIPFILE" 'Image' -d "$TMPDIR"
          dd if="$TMPDIR/Image" of=$(find /dev/block/bootdevice/by-name -name "boot" | head -1)
          ui_print "Done!"
          EOF

          echo "#MAGISK" > zip/META-INF/com/google/android/updater-script

          cat > zip/module.prop << EOF
          id=custom-kernel
          name=Custom Kernel A05s
          version=v${{ github.run_number }}
          versionCode=${{ github.run_number }}
          author=Hichem299
          description=Kernel for SM-A057F
          EOF

          cd zip && zip -r9 ../kernel-${{ github.run_number }}.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-${{ github.run_number }}
          name: Kernel Build ${{ github.run_number }}
          files: kernel-${{ github.run_number }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
